<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DANA OTP - History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f5f7fb; }
        .dark body { background: #0f172a; }
        
        .status-success {
            background: #d1fae5;
            color: #065f46;
        }
        .dark .status-success {
            background: #065f46;
            color: #d1fae5;
        }
        .status-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }
        .dark .status-cancelled {
            background: #7f1d1d;
            color: #fecaca;
        }
        .status-waiting {
            background: #fef3c7;
            color: #92400e;
        }
        .dark .status-waiting {
            background: #78350f;
            color: #fde68a;
        }
        
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .history-table th,
        .history-table td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        .dark .history-table th,
        .dark .history-table td {
            border-bottom-color: #334155;
        }
        .history-table th {
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
        }
        .dark .history-table th {
            background: #1e293b;
            color: #f1f5f9;
        }
        .history-table tr:hover {
            background: #f1f5f9;
        }
        .dark .history-table tr:hover {
            background: #334155;
        }
        
        .source-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .source-api { background-color: #3b82f6; }
        .source-local { background-color: #10b981; }
        
        /* Warna PUTIH UNTUK SEMUA TEKS DI MODE GELAP */
        .dark body,
        .dark .history-table th,
        .dark .history-table td,
        .dark .text-slate-500,
        .dark .text-slate-600,
        .dark .text-slate-700,
        .dark .text-gray-500,
        .dark .text-gray-600,
        .dark .font-mono,
        .dark .text-sm,
        .dark #totalRecords,
        .dark #pageInfo,
        .dark .px-3.py-1,
        .dark option,
        .dark input,
        .dark input::placeholder {
            color: #ffffff !important;
        }
        
        .dark input,
        .dark select {
            background-color: #1e293b !important;
            border-color: #475569 !important;
        }
        
        .dark input::placeholder {
            color: #94a3b8 !important;
        }
        
        .dark a.text-slate-600 {
            color: #cbd5e1 !important;
        }
        .dark a.text-slate-600:hover {
            color: #60a5fa !important;
        }
        
        .dark #prevPage,
        .dark #nextPage {
            color: #e2e8f0 !important;
            background-color: #334155 !important;
        }
        .dark #prevPage:disabled,
        .dark #nextPage:disabled {
            color: #64748b !important;
            background-color: #1e293b !important;
        }
        
        .dark #refreshBtn {
            color: white !important;
        }
        
        .dark td.font-semibold.text-green-600 {
            color: #4ade80 !important;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-slate-900 transition-colors duration-300">

    <div id="toastMsg" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 hidden transition-all pointer-events-none"></div>

    <!-- Header -->
    <header class="fixed top-0 left-0 w-full bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-b border-gray-200 dark:border-slate-800 z-30">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between max-w-7xl">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-xl flex items-center justify-center">
                    <img src="/dana.png" alt="DANA Logo" class="w-full h-full object-contain">
                </div>
                <span class="font-bold text-xl text-slate-800 dark:text-white">DANA<span class="text-blue-600">OTP</span></span>
            </div>
            <div class="flex items-center gap-3">
                <a href="/" class="text-sm text-slate-600 dark:text-slate-300 hover:text-blue-600 transition">
                    <i class="fas fa-home mr-1"></i> Dashboard
                </a>
                <a href="/history.html" class="text-sm text-blue-600 font-semibold">
                    <i class="fas fa-history mr-1"></i> History
                </a>
                <button id="themeToggle" class="w-9 h-9 rounded-full bg-gray-100 dark:bg-slate-800 flex items-center justify-center">
                    <i class="fas fa-moon dark:hidden text-slate-600"></i>
                    <i class="fas fa-sun hidden dark:inline-block text-yellow-400"></i>
                </button>
                <span id="balanceDisplay" class="text-sm font-semibold text-green-600 dark:text-green-400 bg-green-50 dark:bg-green-900/30 px-4 py-1.5 rounded-full">
                    <i class="fas fa-coins mr-1"></i> $0.00
                </span>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-10 max-w-7xl mx-auto px-4">
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-slate-800 dark:text-white">
                Order <span class="text-blue-600">History</span>
            </h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">View all your past DANA SMS activations</p>
        </div>

        <div class="bg-white dark:bg-slate-800/80 rounded-2xl p-5 shadow-sm border border-gray-200 dark:border-slate-700 mb-6">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500"></i>
                        <input type="text" id="searchInput" placeholder="Search by Phone or ID..." 
                               class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>
                <div>
                    <select id="statusFilter" class="px-4 py-2 rounded-xl border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:border-blue-500">
                        <option value="all">All Status</option>
                        <option value="Success">Success</option>
                        <option value="Cancelled">Cancelled</option>
                        <option value="Waiting">Waiting</option>
                    </select>
                </div>
                <button id="refreshBtn" class="px-4 py-2 rounded-xl bg-blue-500 text-white hover:bg-blue-600 transition">
                    <i class="fas fa-sync-alt mr-1"></i> Refresh
                </button>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800/80 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th><i class="fas fa-hashtag mr-1"></i> ID</th>
                            <th><i class="fas fa-phone mr-1"></i> Phone</th>
                            <th><i class="fas fa-envelope mr-1"></i> SMS</th>
                            <th><i class="fas fa-tag mr-1"></i> Status</th>
                            <th><i class="fas fa-dollar-sign mr-1"></i> Price</th>
                            <th><i class="fas fa-calendar mr-1"></i> Date & Time</th>
                            <th><i class="fas fa-database mr-1"></i> Source</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <tr>
                            <td colspan="7" class="text-center py-8 text-slate-400 dark:text-slate-500">
                                <i class="fas fa-spinner fa-pulse mr-2"></i> Loading history...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div id="pagination" class="px-6 py-4 border-t border-gray-200 dark:border-slate-700 flex justify-between items-center">
                <span id="totalRecords" class="text-sm text-slate-500 dark:text-slate-400"></span>
                <div class="flex gap-2">
                    <button id="prevPage" class="px-3 py-1 rounded-lg bg-gray-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-gray-200 disabled:opacity-50" disabled>
                        <i class="fas fa-chevron-left"></i> Previous
                    </button>
                    <span id="pageInfo" class="px-3 py-1 text-sm text-slate-600 dark:text-slate-300"></span>
                    <button id="nextPage" class="px-3 py-1 rounded-lg bg-gray-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-gray-200 disabled:opacity-50" disabled>
                        Next <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let allHistory = [];
        let currentPage = 1;
        let filteredHistory = [];
        const itemsPerPage = 10;

        async function checkBalance() {
            try {
                const res = await fetch('/api/balance');
                const text = await res.text();
                let balance = text.includes(':') ? text.split(':')[1] : text;
                balance = parseFloat(balance).toFixed(4);
                document.getElementById('balanceDisplay').innerHTML = `<i class="fas fa-coins mr-1"></i> $${balance}`;
            } catch (err) { console.error(err); }
        }

        async function loadHistory() {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = `<tr><td colspan="7" class="text-center py-8 text-slate-400 dark:text-slate-500"><i class="fas fa-spinner fa-pulse mr-2"></i> Loading history...<\/td><\/tr>`;
            
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                let apiHistory = (data && data.history) ? data.history : [];
                let localHistory = JSON.parse(localStorage.getItem('dana_history') || '[]');
                
                const mergedMap = new Map();
                
                apiHistory.forEach(item => {
                    mergedMap.set(item.id, { ...item, source: 'API' });
                });
                
                localHistory.forEach(item => {
                    mergedMap.set(item.id, { ...item, source: 'Local' });
                });
                
                allHistory = Array.from(mergedMap.values()).sort((a, b) => {
                    const timeA = a.timestamp || new Date(a.date).getTime();
                    const timeB = b.timestamp || new Date(b.date).getTime();
                    return timeB - timeA;
                });
                
                if (allHistory.length === 0) {
                    allHistory = [
                        { id: "492506304", phone: "+6285141686028", sms: "", status: "Cancelled", price: 0, date: "2026-06-15 00:18:00", timestamp: Date.now() - 86400000, source: "Sample" },
                        { id: "491834595", phone: "+6283190844967", sms: "123456", status: "Success", price: 0.03509, date: "2026-06-14 20:21:00", timestamp: Date.now() - 172800000, source: "Sample" }
                    ];
                }
                
                applyFilters();
                
            } catch (err) {
                console.error('Error loading history:', err);
                const localHistory = JSON.parse(localStorage.getItem('dana_history') || '[]');
                if (localHistory.length > 0) {
                    allHistory = localHistory;
                    applyFilters();
                } else {
                    tbody.innerHTML = `<tr><td colspan="7" class="text-center py-8 text-slate-400 dark:text-slate-500"><i class="fas fa-inbox text-3xl mb-2 opacity-50"></i><p>No history found</p><\/td><\/tr>`;
                }
            }
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            
            filteredHistory = allHistory.filter(item => {
                const matchSearch = item.phone?.toLowerCase().includes(searchTerm) || 
                                   item.id?.toString().includes(searchTerm);
                const matchStatus = statusFilter === 'all' || item.status === statusFilter;
                return matchSearch && matchStatus;
            });
            
            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filteredHistory.slice(start, end);
            displayHistory(pageData);
            updatePagination();
        }

        function displayHistory(history) {
            const tbody = document.getElementById('historyTableBody');
            
            if (history.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-8 text-slate-400 dark:text-slate-500"><i class="fas fa-inbox text-3xl mb-2 opacity-50"></i><p>No history found</p><\/td><\/tr>`;
                return;
            }
            
            tbody.innerHTML = history.map(item => {
                const statusClass = item.status === 'Success' ? 'status-success' : 
                                   (item.status === 'Cancelled' ? 'status-cancelled' : 'status-waiting');
                const statusIcon = item.status === 'Success' ? 'fa-check-circle' : 
                                  (item.status === 'Cancelled' ? 'fa-times-circle' : 'fa-clock');
                const smsDisplay = item.sms ? `<i class="fas fa-envelope-open-text text-green-500"></i> ${item.sms}` : '-';
                
                let dateDisplay = item.date;
                if (item.timestamp) {
                    dateDisplay = new Date(item.timestamp).toLocaleString('id-ID', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
                
                // Format harga seperti di index (tanpa trailing zeros)
                let priceValue = parseFloat(item.price);
                let formattedPrice = priceValue.toString();
                if (formattedPrice === '0') formattedPrice = '0';
                
                const sourceBadge = item.source === 'API' 
                    ? `<span class="text-xs"><span class="source-badge source-api"></span>API</span>`
                    : `<span class="text-xs"><span class="source-badge source-local"></span>Local</span>`;
                
                return `
                    <tr class="hover:bg-gray-50 dark:hover:bg-slate-700/50 transition">
                        <td class="font-mono text-sm">${item.id}<\/td>
                        <td class="font-mono text-sm">${item.phone || '-'}<\/td>
                        <td class="text-sm">${smsDisplay}<\/td>
                        <td><span class="px-2 py-1 rounded-full text-xs font-semibold ${statusClass}"><i class="fas ${statusIcon} mr-1"></i> ${item.status}<\/span><\/td>
                        <td class="font-semibold text-green-600">$${formattedPrice}<\/td>
                        <td class="text-sm text-slate-500 dark:text-slate-400">${dateDisplay}<\/td>
                        <td class="text-sm">${sourceBadge}<\/td>
                    <\/tr>
                `;
            }).join('');
        }

        function updatePagination() {
            const totalPages = Math.ceil(filteredHistory.length / itemsPerPage);
            const totalRecords = document.getElementById('totalRecords');
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            
            totalRecords.textContent = `${filteredHistory.length} records found`;
            pageInfo.textContent = `Page ${currentPage} of ${totalPages || 1}`;
            
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages || totalPages === 0;
        }

        function initTheme() {
            const themeToggle = document.getElementById('themeToggle');
            if (localStorage.theme === 'dark') document.documentElement.classList.add('dark');
            themeToggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            checkBalance();
            loadHistory();
            
            document.getElementById('searchInput').addEventListener('input', () => {
                currentPage = 1;
                applyFilters();
            });
            document.getElementById('statusFilter').addEventListener('change', () => {
                currentPage = 1;
                applyFilters();
            });
            document.getElementById('refreshBtn').addEventListener('click', () => {
                loadHistory();
            });
            document.getElementById('prevPage').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                }
            });
            document.getElementById('nextPage').addEventListener('click', () => {
                const totalPages = Math.ceil(filteredHistory.length / itemsPerPage);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                }
            });
            
            setInterval(checkBalance, 30000);
        });
    </script>
</body>
</html>
